name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        run: npm run build

  api:
    name: API
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: apps/api/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --locked

      - name: Import app
        working-directory: apps/api
        run: uv run python -c "from main import app; from app.schemas import ActionCard, EvidenceItem, AgentTraceStep, ActionCardStatusUpdate, ReviewEvent, InboxItem, ActionCardEvalRunResult, AgentRunResult; from app.services.action_card_store import list_action_cards; from app.services.evidence_store import list_evidence_items; from app.services.agent_trace_store import list_agent_steps; from app.services.inbox_item_store import list_inbox_items, get_inbox_item; from app.services.evaluation_service import run_action_card_eval; from app.services.agent_run_service import run_agent_for_inbox_item; cards = list_action_cards(); evidence = list_evidence_items(); steps = list_agent_steps(); inbox_items = list_inbox_items(); eval_result = run_action_card_eval(); agent_run = run_agent_for_inbox_item(get_inbox_item('inbox_001')); print(app.title, ActionCard.__name__, len(cards), EvidenceItem.__name__, len(evidence), AgentTraceStep.__name__, len(steps), ActionCardStatusUpdate.__name__, ReviewEvent.__name__, InboxItem.__name__, len(inbox_items), ActionCardEvalRunResult.__name__, eval_result.passed_cases, AgentRunResult.__name__, agent_run.action_card.id)"

  infra:
    name: Infra
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Docker Compose config
        run: docker compose -f infra/docker-compose.yml config
