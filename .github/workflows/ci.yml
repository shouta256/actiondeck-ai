name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        run: npm run build

  api:
    name: API
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: apps/api/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --locked

      - name: Smoke test app
        working-directory: apps/api
        run: GEMINI_API_KEY= PYTHONPATH=. uv run python scripts/check_app_smoke.py

      - name: Run agent eval
        working-directory: apps/api
        run: GEMINI_API_KEY= PYTHONPATH=. uv run python scripts/check_eval.py

      - name: Test
        working-directory: apps/api
        run: GEMINI_API_KEY= uv run pytest

  api-db:
    name: API DB
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: apps/api/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --locked

      - name: Start Postgres
        run: docker compose -f infra/docker-compose.yml up -d

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if docker compose -f infra/docker-compose.yml exec -T postgres pg_isready -U actiondeck -d actiondeck_ai; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f infra/docker-compose.yml logs postgres
          exit 1

      - name: Check DB schema
        working-directory: apps/api
        run: PYTHONPATH=. uv run python scripts/check_db.py

      - name: Seed DB
        run: make db-seed

      - name: Check pgvector retrieval
        working-directory: apps/api
        run: GEMINI_API_KEY= EMBEDDING_PROVIDER=local PYTHONPATH=. uv run python scripts/check_pgvector.py

  infra:
    name: Infra
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Docker Compose config
        run: docker compose -f infra/docker-compose.yml config
